backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "images"

# Uncomment the line below for local development (bypasses auth)
# local_backend: true

collections:
  - label: "Artworks"
    name: "artworks"
    files:
      - label: "Artworks List"
        name: "artworks_list"
        file: "artworks.json"
        extension: "json"
        format: "json"
        fields:
          - label: "Artworks"
            name: "artworks"
            widget: "list"
            collapsed: false
            summary: "{{fields.title}} ({{fields.status}})"
            fields:
              - { label: "Slug (internal ID)", name: "slug", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Year", name: "year", widget: "number", value_type: "int" }
              - { label: "Medium", name: "medium", widget: "string" }
              - { label: "Size", name: "size", widget: "string", hint: "e.g. 24 × 18 in" }
              - label: "Status"
                name: "status"
                widget: "select"
                options:
                  - { label: "Available", value: "available" }
                  - { label: "Sold / Placed", value: "sold" }
                  - { label: "Reserved", value: "reserved" }
              - label: "Price Display"
                name: "price_display"
                widget: "select"
                options:
                  - { label: "Show number", value: "number" }
                  - { label: "Request price", value: "request" }
                  - { label: "Note only (no price)", value: "note-only" }
              - { label: "Price (USD)", name: "price", widget: "string", required: false, hint: "Number, ‘Inquire’, or custom text" }
              - { label: "Note (e.g. ‘Private collection’)", name: "note", widget: "string", required: false }
              - { label: "Image", name: "image", widget: "image" }
              - label: "Tags"
                name: "tags"
                widget: "list"
                required: false
                field: { label: "Tag", name: "tag", widget: "string" }
              - { label: "Prints Available", name: "printsAvailable", widget: "boolean", default: true, required: false }
              - label: "Print Prices"
                name: "printPrices"
                widget: "object"
                required: false
                collapsed: true
                fields:
                  - { label: "Small", name: "Small", widget: "number", default: 40, required: false }
                  - { label: "Medium", name: "Medium", widget: "number", default: 70, required: false }
                  - { label: "Large", name: "Large", widget: "number", default: 120, required: false }
              - { label: "Description", name: "description", widget: "text", required: false }
              - { label: "Featured", name: "featured", widget: "boolean", default: false, required: false }
